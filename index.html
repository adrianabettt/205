<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TROCA DE REGRAS - BNCC EF02CO01</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            text-align: center; 
            background: #FFF9C4; 
            padding: 5px; 
            margin: 0;
            overflow: hidden; /* Evita scroll na maioria das telas de projetor */
        }

        .box { 
            max-width: 900px; 
            height: 95vh; 
            margin: 5px auto; 
            background: white; 
            padding: 15px; 
            border-radius: 40px; 
            border: 10px solid #FBC02D; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        h1 { 
            color: #F9A825; 
            font-size: 38px; 
            margin: 5px 0; 
            text-transform: uppercase;
        }

        .instrucao { 
            font-size: 28px; 
            background: #FFF59D; 
            padding: 15px; 
            border-radius: 20px; 
            margin: 5px 0; 
            font-weight: bold;
            text-transform: uppercase;
            border: 3px dashed #F9A825;
            width: 90%;
        }

        b { 
            color: #E65100; 
            font-size: 36px; 
            display: block;
        }

        #area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .item { 
            font-size: 90px; 
            width: 140px; 
            height: 140px; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #EEE; 
            border-radius: 25px; 
            cursor: pointer; 
            transition: 0.2s; 
            background: #FAFAFA;
        }

        .item.selected { 
            border-color: #FBC02D; 
            background: #FFFDE7; 
            transform: scale(1.05); 
            box-shadow: 0 5px 15px rgba(251, 192, 45, 0.4);
        }

        button { 
            padding: 15px 50px; 
            font-size: 28px; 
            background: #F9A825; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 6px #E65100; 
            text-transform: uppercase;
        }

        button:active { 
            box-shadow: none; 
            transform: translateY(4px); 
        }

        .progresso { 
            font-size: 22px; 
            color: #795548; 
            font-weight: bold; 
            margin-top: 10px;
        }

        #tela-nota { display: none; justify-content: center; align-items: center; }

        .nota-final { 
            font-size: 150px; 
            font-weight: bold; 
            color: #FBC02D; 
        }
    </style>
</head>
<body>

    <div id="jogo" class="box">
        <h1>🔄 TROCA DE REGRAS</h1>
        
        <div class="instrucao">
            QUAL É A REGRA AGORA?
            <b id="regra">CARREGANDO...</b>
        </div>

        <div id="area"></div>

        <div class="controles">
            <button onclick="proximo()" id="btn-acao">CONFERIR RESPOSTA</button>
            <div class="progresso">DESAFIO: <span id="cont-fase">1</span> DE 10</div>
        </div>
    </div>

    <div id="tela-nota" class="box">
        <h1>🏁 ATIVIDADE CONCLUÍDA</h1>
        <p style="font-size: 35px; font-weight: bold; margin: 0;">SUA NOTA É:</p>
        <div id="valor-nota" class="nota-final">0</div>
        <button onclick="location.reload()">JOGAR DE NOVO</button>
    </div>

<script>
    const bancoItens = [
        {e: "🍎", cor: "VERMELHO", tipo: "COMIDA"},
        {e: "🚗", cor: "VERMELHO", tipo: "MÁQUINA"},
        {e: "🍓", cor: "VERMELHO", tipo: "COMIDA"},
        {e: "🚒", cor: "VERMELHO", tipo: "MÁQUINA"},
        {e: "🍌", cor: "AMARELO", tipo: "COMIDA"},
        {e: "🚜", cor: "AMARELO", tipo: "MÁQUINA"},
        {e: "🧀", cor: "AMARELO", tipo: "COMIDA"},
        {e: "🐥", cor: "AMARELO", tipo: "ANIMAL"},
        {e: "🍅", cor: "VERMELHO", tipo: "COMIDA"},
        {e: "🚁", cor: "VERMELHO", tipo: "MÁQUINA"}
    ];

    const regrasSorteio = [
        {txt: "TUDO QUE É VERMELHO", chave: "cor", valor: "VERMELHO"},
        {txt: "TUDO QUE É AMARELO", chave: "cor", valor: "AMARELO"},
        {txt: "TUDO QUE É DE COMER", chave: "tipo", valor: "COMIDA"},
        {txt: "TUDO QUE É MÁQUINA", chave: "tipo", valor: "MÁQUINA"}
    ];

    let faseAtual = 1;
    let somaNotas = 0;
    let regraDaRodada = {};

    function iniciarFase() {
        regraDaRodada = regrasSorteio[Math.floor(Math.random() * regrasSorteio.length)];
        document.getElementById('regra').innerText = regraDaRodada.txt;
        document.getElementById('cont-fase').innerText = faseAtual;
        
        if (faseAtual === 10) {
            document.getElementById('btn-acao').innerText = "VER NOTA FINAL";
        }

        const area = document.getElementById('area');
        area.innerHTML = "";

        // Lógica para garantir ao menos 1 item correto
        let itensCorretos = bancoItens.filter(i => i[regraDaRodada.chave] === regraDaRodada.valor);
        let itensIncorretos = bancoItens.filter(i => i[regraDaRodada.chave] !== regraDaRodada.valor);
        
        // Sorteia 1 correto obrigatoriamente e 5 outros aleatórios
        let exibidos = [];
        exibidos.push(itensCorretos[Math.floor(Math.random() * itensCorretos.length)]);
        
        let embaralhado = [...bancoItens].sort(() => Math.random() - 0.5);
        for(let i=0; i<5; i++) {
            exibidos.push(embaralhado[i]);
        }
        
        // Embaralha os 6 finais para o correto não ficar sempre na primeira posição
        exibidos.sort(() => Math.random() - 0.5);

        exibidos.forEach((it) => {
            let d = document.createElement('div');
            d.className = 'item';
            d.innerText = it.e;
            d.dataset.valorAtributo = it[regraDaRodada.chave];
            d.onclick = () => d.classList.toggle('selected');
            area.appendChild(d);
        });
    }

    function proximo() {
        const cards = document.querySelectorAll('.item');
        let totalCorretosNaTela = 0;
        let acertosAluno = 0;
        let errosAluno = 0;

        cards.forEach(card => {
            const selecionado = card.classList.contains('selected');
            const ehCorreto = card.dataset.valorAtributo === regraDaRodada.valor;

            if (ehCorreto) {
                totalCorretosNaTela++;
                if (selecionado) acertosAluno++;
            } else {
                if (selecionado) errosAluno++;
            }
        });

        // Cálculo da nota da rodada (proporcional aos acertos)
        let notaRodada = (acertosAluno - errosAluno) / totalCorretosNaTela;
        if (notaRodada < 0) notaRodada = 0;
        somaNotas += notaRodada;

        if (faseAtual < 10) {
            faseAtual++;
            iniciarFase();
        } else {
            finalizar();
        }
    }

    function finalizar() {
        document.getElementById('jogo').style.display = 'none';
        document.getElementById('tela-nota').style.display = 'flex';
        
        let notaFinal = Math.round(somaNotas); 
        if (notaFinal > 10) notaFinal = 10;
        if (notaFinal < 0) notaFinal = 0;
        
        document.getElementById('valor-nota').innerText = notaFinal;
    }

    iniciarFase();
</script>
</body>
</html>
